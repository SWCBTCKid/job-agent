<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Agent Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --text: #e2e8f0;
    --text-dim: #8892a4;
    --accent: #6c8ef5;
    --green: #4ade80;
    --yellow: #facc15;
    --orange: #fb923c;
    --red: #f87171;
    --teal: #22d3ee;
    --purple: #a78bfa;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 16px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
  #resumePicker {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 13px;
    max-width: 280px;
  }
  #statusBar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-left: auto;
    font-size: 12px;
  }
  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .stat-pill .label { color: var(--text-dim); }
  .stat-pill .val { font-weight: 700; }

  /* ── Filters ── */
  #filterBar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-group label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

  input[type="text"], input[type="date"], input[type="number"], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 5px;
    font-size: 12px;
  }
  input[type="text"]:focus, input[type="date"]:focus,
  input[type="number"]:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  #searchInput { width: 180px; }
  #minScore { width: 60px; }

  .chip-group { display: flex; gap: 4px; }
  .chip {
    padding: 3px 9px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    transition: all 0.15s;
    user-select: none;
  }
  .chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .chip:hover:not(.active) { border-color: var(--accent); color: var(--text); }

  #resultCount { margin-left: auto; color: var(--text-dim); font-size: 12px; white-space: nowrap; }

  /* ── Table ── */
  #tableWrap {
    overflow-x: auto;
    padding: 0 20px 60px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
    min-width: 960px;
  }
  thead th {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 8px 10px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    position: sticky;
    top: 94px; /* header + filterbar */
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--text); }
  thead th.sorted { color: var(--accent); }
  thead th .sort-icon { margin-left: 4px; opacity: 0.5; }
  thead th.sorted .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.status-applied   { border-left: 3px solid var(--accent); }
  tbody tr.status-interviewing { border-left: 3px solid var(--green); }
  tbody tr.status-offer     { border-left: 3px solid var(--yellow); }
  tbody tr.status-rejected  { border-left: 3px solid #555; opacity: 0.5; }
  tbody tr.status-skipped   { opacity: 0.35; }

  td {
    padding: 8px 10px;
    vertical-align: top;
    font-size: 13px;
  }

  /* Score badge */
  .score {
    font-weight: 700;
    font-size: 15px;
    font-variant-numeric: tabular-nums;
  }
  .score-high  { color: var(--green); }
  .score-mid   { color: var(--yellow); }
  .score-low   { color: var(--orange); }
  .score-poor  { color: var(--red); }

  .company-cell { font-weight: 600; color: var(--text); }
  .title-cell a {
    color: var(--accent);
    text-decoration: none;
  }
  .title-cell a:hover { text-decoration: underline; }

  .tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .tag-tier1 { background: #1e3a5f; color: var(--teal); }
  .tag-tier2 { background: #2d2b5a; color: var(--purple); }
  .tag-tier3 { background: #3a2a1e; color: var(--orange); }
  .tag-senior { background: #1f3224; color: var(--green); }
  .tag-mid    { background: #1e2d3a; color: var(--accent); }
  .tag-staff  { background: #2e2240; color: var(--purple); }
  .tag-junior { background: #3a2020; color: var(--red); }
  .tag-manager { background: #3a2020; color: var(--red); }

  .reason-cell {
    max-width: 320px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  .notes-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid transparent;
    color: var(--text-dim);
    font-size: 12px;
    padding: 2px 0;
    min-width: 120px;
  }
  .notes-input:focus {
    outline: none;
    border-bottom-color: var(--accent);
    color: var(--text);
  }

  .status-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 11px;
    width: 110px;
  }
  .status-new          { color: var(--text-dim); }
  .status-applied      { color: var(--accent); }
  .status-interviewing { color: var(--green); }
  .status-offer        { color: var(--yellow); }
  .status-rejected     { color: #888; }
  .status-skipped      { color: #555; }

  .salary-cell { color: var(--text-dim); font-size: 12px; white-space: nowrap; }
  .date-cell   { color: var(--text-dim); font-size: 12px; white-space: nowrap; }

  /* Loading */
  #loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 16px;
  }
  #loading .spinner {
    display: inline-block;
    width: 24px; height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #emptyState {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  #emptyState .big { font-size: 40px; margin-bottom: 8px; }

  /* Detail panel */
  #detailPanel {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: 420px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 200;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.2s ease;
    padding: 20px;
  }
  #detailPanel.open { transform: translateX(0); }
  #detailClose {
    float: right;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
  }
  #detailClose:hover { color: var(--text); }
  #detailContent h2 { font-size: 16px; margin: 8px 0 4px; color: var(--text); }
  #detailContent .meta { color: var(--text-dim); font-size: 12px; margin-bottom: 12px; }
  #detailContent .reason-full {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    background: var(--surface2);
    border-radius: 6px;
    padding: 12px;
    margin-top: 8px;
  }
  .detail-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase;
                  letter-spacing: 0.06em; margin-top: 12px; margin-bottom: 4px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #4a5270; }
</style>
</head>
<body>

<header>
  <h1>Job Agent</h1>
  <select id="resumePicker"><option value="">Loading resumes…</option></select>
  <div id="statusBar">
    <div class="stat-pill"><span class="label">Ranked</span><span class="val" id="s-total">—</span></div>
    <div class="stat-pill"><span class="label">Applied</span><span class="val" id="s-applied">—</span></div>
    <div class="stat-pill"><span class="label">Interviewing</span><span class="val" id="s-interviewing">—</span></div>
    <div class="stat-pill"><span class="label">Offer</span><span class="val" id="s-offer">—</span></div>
    <div class="stat-pill"><span class="label">Rejected</span><span class="val" id="s-rejected">—</span></div>
  </div>
</header>

<div id="filterBar">
  <div class="filter-group">
    <label>Search</label>
    <input type="text" id="searchInput" placeholder="company or title…">
  </div>
  <div class="filter-group">
    <label>Min score</label>
    <input type="number" id="minScore" min="0" max="10" step="0.5" value="0" placeholder="0">
  </div>
  <div class="filter-group">
    <label>Level</label>
    <div class="chip-group" id="levelChips">
      <span class="chip active" data-val="any">Any</span>
      <span class="chip" data-val="junior">Junior</span>
      <span class="chip" data-val="mid">Mid</span>
      <span class="chip" data-val="senior">Senior</span>
      <span class="chip" data-val="staff">Staff</span>
    </div>
  </div>
  <div class="filter-group">
    <label>Tier</label>
    <div class="chip-group" id="tierChips">
      <span class="chip active" data-val="any">Any</span>
      <span class="chip" data-val="1">T1</span>
      <span class="chip" data-val="2">T2</span>
      <span class="chip" data-val="3">T3</span>
    </div>
  </div>
  <div class="filter-group">
    <label>Status</label>
    <div class="chip-group" id="statusChips">
      <span class="chip active" data-val="any">All</span>
      <span class="chip" data-val="new">New</span>
      <span class="chip" data-val="applied">Applied</span>
      <span class="chip" data-val="interviewing">Interviewing</span>
      <span class="chip" data-val="offer">Offer</span>
      <span class="chip" data-val="rejected">Rejected</span>
      <span class="chip" data-val="skipped">Skipped</span>
    </div>
  </div>
  <div class="filter-group">
    <label>Posted after</label>
    <input type="date" id="postedAfter">
  </div>
  <span id="resultCount"></span>
</div>

<div id="tableWrap">
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading…</div>
  </div>
  <div id="emptyState" style="display:none">
    <div class="big">🔍</div>
    <div>No results match your filters.</div>
  </div>
  <table id="jobTable" style="display:none">
    <thead>
      <tr>
        <th data-col="claude_score" class="sorted">Score <span class="sort-icon">↓</span></th>
        <th data-col="company">Company <span class="sort-icon"></span></th>
        <th data-col="title">Title <span class="sort-icon"></span></th>
        <th>Level / Tier</th>
        <th data-col="posted_at">Posted <span class="sort-icon"></span></th>
        <th>Salary</th>
        <th>Reason</th>
        <th>Status</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody id="jobTbody"></tbody>
  </table>
</div>

<!-- Detail side panel -->
<div id="detailPanel">
  <button id="detailClose">✕</button>
  <div id="detailContent"></div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let allJobs = [];
let resumeId = '';
let sortCol = 'claude_score';
let sortDir = 'desc';
let pendingNotes = {}; // jobId -> timer

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  await loadResumes();
}

async function loadResumes() {
  const res = await fetch('/api/resumes');
  const resumes = await res.json();
  const picker = document.getElementById('resumePicker');
  picker.innerHTML = resumes.map(r =>
    `<option value="${r.id}">${r.path} (q:${(r.quality_score||0).toFixed(1)}) — ${r.ranked} ranked</option>`
  ).join('');
  if (resumes.length > 0) {
    resumeId = resumes[0].id;
    await loadJobs();
  } else {
    document.getElementById('loading').innerHTML = '<div>No resumes found. Run the job agent first.</div>';
  }
}

async function loadJobs() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('jobTable').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';

  const params = new URLSearchParams({ resume_id: resumeId, sort: sortCol, dir: sortDir.toUpperCase(), limit: 2000 });
  const minScore = parseFloat(document.getElementById('minScore').value) || 0;
  if (minScore > 0) params.set('min_score', minScore);

  const levels = getActiveChips('levelChips');
  if (!levels.includes('any')) levels.forEach(l => params.append('level', l));

  const tiers = getActiveChips('tierChips');
  if (!tiers.includes('any')) tiers.forEach(t => params.append('tier', t));

  const statuses = getActiveChips('statusChips');
  if (!statuses.includes('any')) statuses.forEach(s => params.append('status', s));

  const postedAfter = document.getElementById('postedAfter').value;
  if (postedAfter) params.set('posted_after', postedAfter);

  const search = document.getElementById('searchInput').value.trim();
  if (search) params.set('q', search);

  const [jobsRes, statsRes] = await Promise.all([
    fetch('/api/jobs?' + params),
    fetch('/api/stats?resume_id=' + resumeId),
  ]);
  allJobs = await jobsRes.json();
  const stats = await statsRes.json();

  updateStatusBar(stats);
  renderTable(allJobs);
}

function getActiveChips(groupId) {
  return [...document.getElementById(groupId).querySelectorAll('.chip.active')]
    .map(c => c.dataset.val);
}

// ── Stats bar ─────────────────────────────────────────────────────────────────
function updateStatusBar(stats) {
  document.getElementById('s-total').textContent = stats.total_ranked ?? '—';
  document.getElementById('s-applied').textContent = stats.applied ?? '—';
  document.getElementById('s-interviewing').textContent = stats.interviewing ?? '—';
  document.getElementById('s-offer').textContent = stats.offer ?? '—';
  document.getElementById('s-rejected').textContent = stats.rejected ?? '—';
}

// ── Table rendering ───────────────────────────────────────────────────────────
function renderTable(jobs) {
  document.getElementById('loading').style.display = 'none';
  const tbody = document.getElementById('jobTbody');
  tbody.innerHTML = '';

  if (jobs.length === 0) {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('jobTable').style.display = 'none';
    document.getElementById('resultCount').textContent = '0 results';
    return;
  }

  document.getElementById('jobTable').style.display = 'table';
  document.getElementById('resultCount').textContent = `${jobs.length} result${jobs.length !== 1 ? 's' : ''}`;

  jobs.forEach(job => {
    const tr = document.createElement('tr');
    tr.className = `status-${job.status}`;
    tr.dataset.id = job.id;

    const scoreClass = job.claude_score >= 8 ? 'score-high'
                     : job.claude_score >= 6 ? 'score-mid'
                     : job.claude_score >= 4 ? 'score-low' : 'score-poor';
    const tierTag = job.tier ? `<span class="tag tag-tier${job.tier}">T${job.tier}</span>` : '';
    const levelTag = job.level_fit ? `<span class="tag tag-${job.level_fit}">${job.level_fit}</span>` : '';
    const reasonShort = (job.match_reason || '').slice(0, 120) + ((job.match_reason||'').length > 120 ? '…' : '');

    tr.innerHTML = `
      <td><span class="score ${scoreClass}">${(job.claude_score||0).toFixed(1)}</span></td>
      <td class="company-cell">${esc(job.company)}</td>
      <td class="title-cell">
        <a href="${esc(job.url)}" target="_blank" rel="noopener">${esc(job.title)}</a>
      </td>
      <td>${levelTag} ${tierTag}</td>
      <td class="date-cell">${job.posted_at || '—'}</td>
      <td class="salary-cell">${job.salary || '—'}</td>
      <td class="reason-cell" data-id="${job.id}" style="cursor:pointer">${esc(reasonShort)}</td>
      <td>
        <select class="status-select status-${job.status}" data-id="${job.id}">
          <option value="new"          ${job.status==='new'          ?'selected':''}>— New</option>
          <option value="applied"      ${job.status==='applied'      ?'selected':''}>Applied</option>
          <option value="interviewing" ${job.status==='interviewing' ?'selected':''}>Interviewing</option>
          <option value="offer"        ${job.status==='offer'        ?'selected':''}>Offer</option>
          <option value="rejected"     ${job.status==='rejected'     ?'selected':''}>Rejected</option>
          <option value="skipped"      ${job.status==='skipped'      ?'selected':''}>Skip</option>
        </select>
      </td>
      <td>
        <input class="notes-input" data-id="${job.id}" type="text"
               value="${esc(job.notes||'')}" placeholder="notes…">
      </td>
    `;
    tbody.appendChild(tr);
  });

  // Status dropdowns
  tbody.querySelectorAll('.status-select').forEach(sel => {
    sel.addEventListener('change', async e => {
      const id = e.target.dataset.id;
      const status = e.target.value;
      await patchStatus(id, status);
      // Update row class
      const tr = e.target.closest('tr');
      tr.className = `status-${status}`;
      e.target.className = `status-select status-${status}`;
      // Refresh stats
      const statsRes = await fetch('/api/stats?resume_id=' + resumeId);
      updateStatusBar(await statsRes.json());
    });
  });

  // Notes inputs (debounced)
  tbody.querySelectorAll('.notes-input').forEach(inp => {
    inp.addEventListener('input', e => {
      const id = e.target.dataset.id;
      clearTimeout(pendingNotes[id]);
      pendingNotes[id] = setTimeout(() => patchNotes(id, e.target.value), 800);
    });
  });

  // Click reason to open detail panel
  tbody.querySelectorAll('.reason-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      const id = cell.dataset.id;
      const job = allJobs.find(j => j.id === id);
      if (job) openDetail(job);
    });
  });
}

// ── Detail panel ──────────────────────────────────────────────────────────────
function openDetail(job) {
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');
  const scoreClass = job.claude_score >= 8 ? 'score-high'
                   : job.claude_score >= 6 ? 'score-mid'
                   : job.claude_score >= 4 ? 'score-low' : 'score-poor';
  content.innerHTML = `
    <span class="score ${scoreClass}" style="font-size:28px">${(job.claude_score||0).toFixed(1)}</span>
    <h2>${esc(job.title)}</h2>
    <div class="meta">${esc(job.company)} · ${esc(job.location||'—')} · ${job.posted_at||'—'}</div>
    ${job.salary ? `<div class="meta">Salary: ${esc(job.salary)}</div>` : ''}
    <div style="display:flex;gap:6px;margin-bottom:8px">
      ${job.level_fit ? `<span class="tag tag-${job.level_fit}">${job.level_fit}</span>` : ''}
      ${job.tier ? `<span class="tag tag-tier${job.tier}">Tier ${job.tier}</span>` : ''}
    </div>
    <a href="${esc(job.url)}" target="_blank" rel="noopener"
       style="color:var(--accent);font-size:12px">Open job posting ↗</a>
    <div class="detail-label">Match Analysis</div>
    <div class="reason-full">${esc(job.match_reason || 'No analysis available.')}</div>
    <div class="detail-label">Stage 1 Score</div>
    <div style="color:var(--text-dim);font-size:13px">${(job.stage1_score||0).toFixed(3)}</div>
  `;
  panel.classList.add('open');
}

document.getElementById('detailClose').addEventListener('click', () => {
  document.getElementById('detailPanel').classList.remove('open');
});

// ── API helpers ───────────────────────────────────────────────────────────────
async function patchStatus(jobId, status) {
  await fetch(`/api/jobs/${jobId}/status?resume_id=${resumeId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status }),
  });
}

async function patchNotes(jobId, notes) {
  await fetch(`/api/jobs/${jobId}/notes?resume_id=${resumeId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ notes }),
  });
}

// ── Sorting ───────────────────────────────────────────────────────────────────
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) {
      sortDir = sortDir === 'desc' ? 'asc' : 'desc';
    } else {
      sortCol = col;
      sortDir = col === 'claude_score' ? 'desc' : 'asc';
    }
    document.querySelectorAll('thead th').forEach(t => {
      t.classList.remove('sorted');
      const icon = t.querySelector('.sort-icon');
      if (icon) icon.textContent = '';
    });
    th.classList.add('sorted');
    const icon = th.querySelector('.sort-icon');
    if (icon) icon.textContent = sortDir === 'desc' ? '↓' : '↑';
    loadJobs();
  });
});

// ── Resume picker ─────────────────────────────────────────────────────────────
document.getElementById('resumePicker').addEventListener('change', async e => {
  resumeId = e.target.value;
  await loadJobs();
});

// ── Filter chips (multi-select for level/tier, single for status) ─────────────
function setupChips(groupId, multi = true) {
  document.getElementById(groupId).addEventListener('click', async e => {
    if (!e.target.classList.contains('chip')) return;
    const val = e.target.dataset.val;
    const chips = document.getElementById(groupId).querySelectorAll('.chip');

    if (val === 'any') {
      chips.forEach(c => c.classList.remove('active'));
      e.target.classList.add('active');
    } else {
      document.getElementById(groupId).querySelector('[data-val="any"]').classList.remove('active');
      if (multi) {
        e.target.classList.toggle('active');
        // If nothing active, re-activate 'any'
        const anyActive = [...chips].some(c => c.classList.contains('active') && c.dataset.val !== 'any');
        if (!anyActive) {
          document.getElementById(groupId).querySelector('[data-val="any"]').classList.add('active');
        }
      } else {
        chips.forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
      }
    }
    await loadJobs();
  });
}

setupChips('levelChips', true);
setupChips('tierChips', true);
setupChips('statusChips', true);

// ── Text/number filter debounce ───────────────────────────────────────────────
let searchTimer;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadJobs, 300);
});
document.getElementById('minScore').addEventListener('change', loadJobs);
document.getElementById('postedAfter').addEventListener('change', loadJobs);

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
